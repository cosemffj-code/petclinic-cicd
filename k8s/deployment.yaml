apiVersion: apps/v1
kind: Deployment
metadata:
  name: petclinic
  namespace: petclinic
spec:
  replicas: 2
  selector:
    matchLabels:
      app: petclinic
  template:
    metadata:
      labels:
        app: petclinic
    spec:
      containers:
      - name: petclinic
        image: 450444046629.dkr.ecr.ap-northeast-1.amazonaws.com/user20-petclinic:v14
        ports:
        - containerPort: 8080
        env:
        - name: DB_HOST
          value: "user20-db-mysql.cpuoiki0ilgq.ap-northeast-1.amazonaws.com"
